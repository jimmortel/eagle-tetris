<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Tetris 🦅📱</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: gold; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; /* Crucial pour mobile */
            padding-top: 20px;
        }
        h1 { margin: 5px 0; font-size: 1.2rem; }
#game-layout { 
    display: flex; 
    transform: scale(0.85); 
    transform-origin: top center; 
    margin-top: -10px;
}

        #game-container { 
            position: relative; 
            border: 4px solid gold; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            background: #000;
            line-height: 0;
        }
        canvas { 
            display: block; 
            height: 60vh; /* Agrandit le jeu visuellement */
            width: auto;
        }
        
        .stats { 
            text-align: left; 
            font-size: 16px;
            font-weight: bold;
            min-width: 70px;
        }
        
        /* Stylisation des Boutons Tactiles */
        #mobile-controls { 
            margin-top: 15px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            width: 90%; 
            max-width: 300px; 
        }
        .touch-btn { 
            background: #000; 
            color: gold; 
            border: 2px solid gold; 
            border-radius: 10px; 
            padding: 15px; 
            font-size: 20px; 
            font-weight: bold;
            text-align: center; 
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            box-shadow: 0 4px #444;
            transition: all 0.1s ease;
        }
        .touch-btn:active { 
            background: #333; 
            box-shadow: 0 1px #222;
            transform: translateY(3px); 
        }
        #btn-rotate { grid-column: 2; font-size: 24px;} /* Centré en haut */
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

    </style>
</head>
<body>
    <h1>EAGLE TETRIS 🦅📱</h1>
    <button id="start-btn" style="background: gold; color: black; font-weight: bold; padding: 15px 30px; border: none; border-radius: 5px; margin-bottom: 20px; font-size: 18px; cursor: pointer;">
    START EAGLE ARCADE 🦅
</button>
    <div id="game-layout">
        <div id="game-container">
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>
        <div class="stats">
            <div>Score:<br><span id="score">0</span></div><br>
            <div>Lines:<br><span id="lines">0</span></div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="touch-btn" id="btn-rotate">↻</div>
        <div class="touch-btn" id="btn-left">←</div>
        <div class="touch-btn" id="btn-down">↓</div>
        <div class="touch-btn" id="btn-right">→</div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const linesElement = document.getElementById('lines');
        
        context.scale(20, 20);

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
            }
            updateScore();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[4, 0, 0], [4, 0, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;

<script>
    // --- MOTEUR AUDIO EAGLE ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let musicStarted = false;

    function playNote(freq, start, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square'; // Son rétro GameBoy
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.05, start); // Volume musique (assez bas)
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + duration);
    }

    // Mélodie mythique : [Fréquence, Durée]
    const theme = [
        [659, 4], [493, 8], [523, 8], [587, 4], [523, 8], [493, 8],
        [440, 4], [440, 8], [523, 8], [659, 4], [587, 8], [523, 8],
        [493, 4], [493, 8], [523, 8], [587, 4], [659, 4],
        [523, 4], [440, 4], [440, 4]
    ];

    function playMusicLoop() {
        if (!musicStarted) return;
        let tempo = 0.15; // Vitesse
        let now = audioCtx.currentTime;
        let offset = 0;

        theme.forEach(note => {
            let duration = (1 / note[1]) * 2;
            playNote(note[0], now + offset, duration);
            offset += duration;
        });

        // Relance la boucle après la fin de la mélodie (~4 secondes)
        setTimeout(playMusicLoop, offset * 1000);
    }

    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const startAudio = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!musicStarted) {
            musicStarted = true;
            playMusicLoop();
        }
    };

    // --- LOGIQUE TETRIS ---
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const linesElement = document.getElementById('lines');
    context.scale(20, 20);

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            player.score += rowCount * 10;
            player.lines += 1;
            rowCount *= 2;
            playSound(523, 'square', 0.2); // Son Ligne
        }
        updateScore();
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function createPiece(type) {
        if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
        if (type === 'O') return [[2, 2], [2, 2]];
        if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
        if (type === 'J') return [[4, 0, 0], [4, 0, 0], [4, 4, 0]];
        if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
        if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
    }

    function draw() {
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);
        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    context.fillStyle = colors[value];
                    context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    context.lineWidth = 0.05;
                    context.strokeStyle = 'white';
                    context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                }
            });
        });
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            playSound(150, 'triangle', 0.05); // Son Pose
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.lines = 0;
            updateScore();
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
        playSound(440, 'square', 0.05); // Son Rotation
    }

        function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        draw();
        requestAnimationFrame(update);
    }

        let gameRunning = false;

    function update(time = 0) {
        if (!gameRunning) return;
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        draw();
        requestAnimationFrame(update);
    }

    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!gameRunning) {
            gameRunning = true;
            document.getElementById('start-btn').style.display = 'none';
            playerReset();
            updateScore();
            update();
            if (typeof playMusicLoop === 'function') playMusicLoop();
        }
    }

    // Liaison du bouton START
    const sBtn = document.getElementById('start-btn');
    sBtn.addEventListener('click', startGame);
    sBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });

    // Liaison des touches directionnelles
    const cmds = {'btn-left':-1, 'btn-right':1, 'btn-down':'d', 'btn-rotate':'r'};
    Object.keys(cmds).forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!gameRunning) startGame();
            if (cmds[id] === 'd') playerDrop();
            else if (cmds[id] === 'r') playerRotate(1);
            else playerMove(cmds[id]);
        }, {passive: false});
    });
</script>
</body>
</html>
