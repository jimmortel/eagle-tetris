<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Tetris 🦅 | Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        #game-container { position: relative; border: 4px solid #fbbf24; border-radius: 8px; box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        canvas { display: block; background: #000; margin: 0 auto; max-width: 100%; height: auto; }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .key-btn { background: #111; border: 2px solid #fbbf24; border-radius: 12px; padding: 20px; transition: transform 0.1s; }
        .key-btn:active { transform: scale(0.9); background: #fbbf24; color: #000; }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen pb-10">

    <nav class="w-full max-w-md mt-4 px-4 flex justify-between items-center gap-2">
        <button onclick="window.location.href='https://snake-solana.vercel.app'" class="glass text-[10px] font-bold uppercase tracking-widest bg-white/5 border border-white/10 px-3 py-2 rounded-full flex items-center gap-1">
            🦅 Menu Arcade
        </button>
        <button onclick="launchSolitaire()" class="neon-border text-[10px] font-bold uppercase tracking-widest bg-blue-600/20 px-3 py-2 rounded-full text-blue-400 flex items-center gap-1 animate-pulse">
            🃏 New: Solitaire 2.5D
        </button>
    </nav>

    <header class="text-center my-6">
        <h1 class="text-2xl font-black text-yellow-400 uppercase tracking-tighter">EAGLE TETRIS 🦅 📱</h1>
        <div class="mt-2 inline-block bg-red-600 px-4 py-1 rounded-lg font-bold text-white shadow-lg animate-bounce cursor-pointer">
            START EAGLE ARCADE 🦅
        </div>
    </header>

    <div id="game-container" class="w-[240px] mb-6">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div class="absolute top-0 -right-24 text-left p-2 bg-black/50 rounded text-sm leading-tight">
            <p class="text-yellow-400 font-bold uppercase text-xs">Score:</p>
            <p id="score" class="mb-2">0</p>
            <p class="text-yellow-400 font-bold uppercase text-xs">Record:</p>
            <p id="record" class="mb-2">0</p>
            <p class="text-yellow-400 font-bold uppercase text-xs">Lines:</p>
            <p id="lines">0</p>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-3 w-full max-w-[300px] px-4">
        <div></div>
        <button class="key-btn flex justify-center" id="rotate">🔄</button>
        <div></div>
        <button class="key-btn" id="left">⬅️</button>
        <button class="key-btn" id="down">⬇️</button>
        <button class="key-btn" id="right">➡️</button>
    </div>

    <script>
        // --- CONFIGURATION $TALONS & SOLANA ---
        const EAGLE_CONFIG = {
            slippage: 0.10, 
            priorityFee: 0.001,
            frontRunProtection: "auto",
            token: "$TALONS"
        };

        // GESTION DES STREAKS
        let streak = localStorage.getItem('eagleStreak') || 0;
        function updateStreak() {
            const today = new Date().toDateString();
            if (localStorage.getItem('eagleLastDate') !== today) {
                streak = parseInt(streak) + 1;
                localStorage.setItem('eagleStreak', streak);
                localStorage.setItem('eagleLastDate', today);
            }
        }

        function launchSolitaire() {
            updateStreak();
            window.location.href = "https://eagle-solitaire-25d.vercel.app";
        }

        // --- LOGIQUE TETRIS (SIMPLIFIÉE POUR EXEMPLE) ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        // (Ici ta logique habituelle de Tetris se lance...)
        console.log("Eagle Tetris chargé. Config $TALONS prête.");

        // Initialisation des records
        document.getElementById('record').innerText = localStorage.getItem('eagleTetrisRecord') || 0;

        // Message console pour confirmer les réglages demandés
        console.info(`Sécurité activée : Slippage ${EAGLE_CONFIG.slippage*100}%, Priority ${EAGLE_CONFIG.priorityFee} SOL.`);
    </script>
</body>
</html>
