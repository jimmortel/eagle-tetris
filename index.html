<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Tetris 🦅📱</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: gold; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; /* Crucial pour mobile */
            padding-top: 20px;
        }
        h1 { margin: 0 0 10px 0; text-shadow: 2px 2px #000; font-size: 24px; }
        
        #game-layout { display: flex; align-items: flex-start; gap: 10px; }

        #game-container { 
            position: relative; 
            border: 4px solid gold; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            background: #000;
            line-height: 0;
        }
        canvas { 
            display: block; 
            height: 60vh; /* Agrandit le jeu visuellement */
            width: auto;
        }
        
        .stats { 
            text-align: left; 
            font-size: 16px;
            font-weight: bold;
            min-width: 70px;
        }
        
        /* Stylisation des Boutons Tactiles */
        #mobile-controls { 
            margin-top: 15px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            width: 90%; 
            max-width: 300px; 
        }
        .touch-btn { 
            background: #000; 
            color: gold; 
            border: 2px solid gold; 
            border-radius: 10px; 
            padding: 15px; 
            font-size: 20px; 
            font-weight: bold;
            text-align: center; 
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            box-shadow: 0 4px #444;
            transition: all 0.1s ease;
        }
        .touch-btn:active { 
            background: #333; 
            box-shadow: 0 1px #222;
            transform: translateY(3px); 
        }
        #btn-rotate { grid-column: 2; font-size: 24px;} /* Centré en haut */
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

    </style>
</head>
<body>
    <h1>EAGLE TETRIS 🦅📱</h1>
    
    <div id="game-layout">
        <div id="game-container">
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>
        <div class="stats">
            <div>Score:<br><span id="score">0</span></div><br>
            <div>Lines:<br><span id="lines">0</span></div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="touch-btn" id="btn-rotate">↻</div>
        <div class="touch-btn" id="btn-left">←</div>
        <div class="touch-btn" id="btn-down">↓</div>
        <div class="touch-btn" id="btn-right">→</div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const linesElement = document.getElementById('lines');
        
        context.scale(20, 20);

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
            }
            updateScore();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[4, 0, 0], [4, 0, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.lines = 0;
                updateScore();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            linesElement.innerText = player.lines;
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, lines: 0 };

        // --- Contrôles Clavier ---
        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 81) playerRotate(-1);
            else if (event.keyCode === 38 || event.keyCode === 87) playerRotate(1);
        });

        // --- NOUVEAU : Contrôles Tactiles (JavaScript) ---
        // Utilisation de 'touchstart' pour une réactivité instantanée
        document.getElementById('btn-left').addEventListener('touchstart', e => { e.preventDefault(); playerMove(-1); });
        document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); playerMove(1); });
        document.getElementById('btn-down').addEventListener('touchstart', e => { e.preventDefault(); playerDrop(); });
        document.getElementById('btn-rotate').addEventListener('touchstart', e => { e.preventDefault(); playerRotate(1); });

        // Pour éviter les bugs de sélection de texte lors du spam de boutons
        document.querySelectorAll('.touch-btn').forEach(btn => {
            btn.addEventListener('touchend', e => e.preventDefault());
        });

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
