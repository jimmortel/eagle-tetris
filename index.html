<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Arcade 🦅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .game-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.2s; }
        .game-card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.15); }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">
    <header class="w-full max-w-md flex justify-between items-center mb-6">
        <div class="bg-orange-500/20 text-orange-500 px-4 py-1 rounded-full text-sm font-bold border border-orange-500/50">
            🔥 Streak: <span id="streakCount">0</span>
        </div>
        <button onclick="share()" class="bg-blue-600 px-4 py-1 rounded-full font-bold text-sm">🚀 SHARE</button>
    </header>

    <h1 class="text-4xl font-black italic mb-1 neon-text tracking-tighter uppercase text-center">Eagle <span class="text-blue-500">Arcade</span></h1>
    <p class="text-gray-400 text-xs mb-8 uppercase tracking-widest text-center">Collect your Genesis Egg Daily</p>

    <div class="grid grid-cols-2 gap-4 w-full max-w-md mb-8">
        <a href="https://snake-solana.vercel.app/" onclick="updateStreak()" class="game-card p-6 rounded-3xl flex flex-col items-center">
            <span class="text-4xl mb-2">🐍</span><span class="font-bold text-sm uppercase">Snake</span>
        </a>
        <a href="https://eagle-wheel.vercel.app/" onclick="updateStreak()" class="game-card p-6 rounded-3xl flex flex-col items-center border-yellow-500/30">
            <span class="text-4xl mb-2">🎡</span><span class="font-bold text-sm uppercase">Wheel</span>
        </a>
        <a href="https://eagle-demineur.vercel.app/" onclick="updateStreak()" class="game-card p-6 rounded-3xl flex flex-col items-center">
            <span class="text-4xl mb-2">💣</span><span class="font-bold text-sm uppercase">Mines</span>
        </a>
        <a href="https://eagle-pop.vercel.app/" onclick="updateStreak()" class="game-card p-6 rounded-3xl flex flex-col items-center">
            <span class="text-4xl mb-2">🎈</span><span class="font-bold text-sm uppercase">Pop</span>
        </a>
        <a href="https://eagle-jump.vercel.app/" onclick="updateStreak()" class="game-card p-6 rounded-3xl flex flex-col items-center">
            <span class="text-4xl mb-2">🚀</span><span class="font-bold text-sm uppercase">Jump</span>
        </a>
        <a href="https://eagle-tetris-game.vercel.app" onclick="updateStreak()" class="game-card p-6 rounded-3xl flex flex-col items-center bg-blue-500/10 border-blue-500/50">
            <span class="text-4xl mb-2">🧩</span><span class="font-bold text-sm uppercase">Tetris</span>
        </a>
    </div>

    <button onclick="window.location.href='https://warpcast.com/eagle-pi'" class="w-full max-w-md bg-yellow-500 text-black py-4 rounded-2xl font-black text-xl mb-4 italic uppercase">
        💰 Tip for $Dunk
    </button>

    <script>
        const streakEl = document.getElementById('streakCount');
        let streak = localStorage.getItem('eagleStreak') || 0;
        let lastDate = localStorage.getItem('eagleLastDate');
        streakEl.innerText = streak;

        function updateStreak() {
            const today = new Date().toDateString();
            if (lastDate !== today) {
                streak = parseInt(streak) + 1;
                localStorage.setItem('eagleStreak', streak);
                localStorage.setItem('eagleLastDate', today);
            }
        }

        function share() {
            const text = encodeURIComponent(`I'm on a ${streak} days streak on the Eagle Arcade! 🦅🔥 Can you beat me? @eagle-pi`);
           window.location.href = `https://warpcast.com/~/compose?text=${text}&embeds[]=https://eagle-tetris-game.vercel.app`;
        }
    </script>
</body>
</html>
