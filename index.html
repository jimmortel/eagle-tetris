<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Arcade 🦅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #1a1a2e 0%, #0f0f1a 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .glass:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.08); border-color: #3b82f6; }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .game-icon { filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3)); }
    </style>
</head>
<body class="text-white font-sans antialiased">
    <div class="max-w-md mx-auto px-6 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black tracking-tighter neon-text mb-2">EAGLE ARCADE <span class="text-blue-500">🦅</span></h1>
            <div class="inline-flex items-center gap-2 bg-blue-500/20 px-4 py-1.5 rounded-full border border-blue-500/30">
                <span class="text-blue-400">🔥 Streak:</span>
                <span id="streakCount" class="font-bold">0</span>
                <span class="text-blue-400 text-sm">jours</span>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <a href="https://eagle-tetris-game.vercel.app" onclick="updateStreak()" class="glass p-6 rounded-[2rem] flex flex-col items-center">
                <span class="text-4xl mb-3 game-icon">🧩</span>
                <span class="text-xs font-bold tracking-widest uppercase text-blue-400">Tetris</span>
            </a>
            
            <a href="https://snake-solana.vercel.app" onclick="updateStreak()" class="glass p-6 rounded-[2rem] flex flex-col items-center">
                <span class="text-4xl mb-3 game-icon">🐍</span>
                <span class="text-xs font-bold tracking-widest uppercase text-green-400">Snake</span>
            </a>

            <a href="https://eagle-wheel.vercel.app" onclick="updateStreak()" class="glass p-6 rounded-[2rem] flex flex-col items-center">
                <span class="text-4xl mb-3 game-icon">🎡</span>
                <span class="text-xs font-bold tracking-widest uppercase text-purple-400">Wheel</span>
            </a>

            <a href="https://eagle-mines.vercel.app" onclick="updateStreak()" class="glass p-6 rounded-[2rem] flex flex-col items-center">
                <span class="text-4xl mb-3 game-icon">💣</span>
                <span class="text-xs font-bold tracking-widest uppercase text-red-400">Mines</span>
            </a>

            <a href="https://eagle-pop.vercel.app" onclick="updateStreak()" class="glass p-6 rounded-[2rem] flex flex-col items-center">
                <span class="text-4xl mb-3 game-icon">🎈</span>
                <span class="text-xs font-bold tracking-widest uppercase text-pink-400">Pop It</span>
            </a>

            <a href="https://eagle-jump.vercel.app" onclick="updateStreak()" class="glass p-6 rounded-[2rem] flex flex-col items-center">
                <span class="text-4xl mb-3 game-icon">🦘</span>
                <span class="text-xs font-bold tracking-widest uppercase text-yellow-400">Jump</span>
            </a>
        </div>

        <button onclick="share()" class="w-full bg-white text-black font-black py-4 rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.2)] active:scale-95 transition-transform uppercase tracking-tighter">
            Partager ma Streak 🚀
        </button>
    </div>

    <script>
        const streakEl = document.getElementById('streakCount');
        let streak = localStorage.getItem('eagleStreak') || 0;
        let lastDate = localStorage.getItem('eagleLastDate');
        streakEl.innerText = streak;

        function updateStreak() {
            const today = new Date().toDateString();
            if (lastDate !== today) {
                streak = parseInt(streak) + 1;
                localStorage.setItem('eagleStreak', streak);
                localStorage.setItem('eagleLastDate', today);
                streakEl.innerText = streak;
            }
        }

        function share() {
            const text = encodeURIComponent(`🦅 I'm on a ${streak} days streak on the Eagle Arcade! 🔥 Can you beat me? @eagle-pi`);
            window.location.href = `https://warpcast.com/~/compose?text=${text}&embeds[]=https://eagle-tetris-game.vercel.app`;
        }
    </script>
</body>
</html>
